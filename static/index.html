<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .upload-box {
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            background: #1a1d27;
            margin-bottom: 24px;
            transition: border-color 0.2s;
        }

        .upload-box:hover {
            border-color: #555;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .upload-box p {
            color: #888;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: #4f6ef7;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin: 8px;
        }

        .btn:hover {
            background: #3d5ce5;
        }

        .btn-secondary {
            background: #2a2d3a;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #333647;
        }

        #file-label {
            display: inline-block;
            background: #2a2d3a;
            color: #e0e0e0;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin: 8px;
            transition: background 0.2s;
        }

        #file-label:hover {
            background: #333647;
        }

        #file-name {
            color: #888;
            font-size: 0.9rem;
            margin-top: 12px;
        }

        .result-box {
            background: #1a1d27;
            border-radius: 12px;
            padding: 24px;
            display: none;
        }

        .result-box h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .field-card {
            background: #0f1117;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .field-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4f6ef7;
            margin-bottom: 6px;
        }

        .field-value {
            font-size: 0.95rem;
            color: #e0e0e0;
            line-height: 1.5;
        }

        .tag {
            display: inline-block;
            background: #2a2d3a;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 0.85rem;
            margin: 3px;
            color: #c0c0c0;
        }

        .error-box {
            background: #2a1a1a;
            border: 1px solid #5a2020;
            border-radius: 8px;
            padding: 16px;
            color: #ff6b6b;
            display: none;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Contract Parser</h1>
        <p class="subtitle">Upload a PDF contract and extract key entities using AI</p>

        <div class="upload-box">
            <div class="upload-icon">📁</div>
            <p>Upload a PDF contract to extract parties, dates, obligations and more</p>
            <label id="file-label" for="file-input">Choose PDF File</label>
            <input type="file" id="file-input" accept=".pdf">
            <br>
            <div id="file-name">No file chosen</div>
            <br>
            <!-- BAD: no loading state — button just freezes -->
            <button class="btn" onclick="uploadFile()">Analyze Contract</button>
        </div>

        <div class="error-box" id="error-box"></div>

        <div class="result-box" id="result-box">
            <h2> Extracted Information</h2>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        document.getElementById('file-input').addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : 'No file chosen';
            document.getElementById('file-name').textContent = fileName;
        });

        async function uploadFile() {
    const fileInput = document.getElementById('file-input');
    const file = fileInput.files[0];

    if (!file) {
        showError('Please select a PDF file first.');
        return;
    }

    const formData = new FormData();
    formData.append('file', file);

    // show loading state while waiting for response
    const btn = document.querySelector('.btn');
    btn.textContent = '⏳ Analyzing...';
    btn.disabled = true;

    document.getElementById('error-box').style.display = 'none';
    document.getElementById('result-box').style.display = 'none';

    try {
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.status === 'success') {
            showResult(data.data);
        } else {
            showError(data.message);
        }
    } catch (error) {
        showError('Something went wrong. Please try again.');
    } finally {
        // Always restore button regardless of success or failure
        btn.textContent = 'Analyze Contract';
        btn.disabled = false;
    }
}

        function showResult(data) {
            document.getElementById('error-box').style.display = 'none';
            const resultBox = document.getElementById('result-box');
            const content = document.getElementById('result-content');

            content.innerHTML = `
                ${field('Contract Type', data.contract_type || 'Unknown')}
                ${field('Effective Date', data.effective_date || 'Not specified')}
                ${field('Expiry Date', data.expiry_date || 'Not specified')}
                ${field('Governing Law', data.governing_law || 'Not specified')}
                ${field('Termination Clause', data.termination_clause || 'Not specified')}
                ${fieldTags('Parties', data.parties?.map(p => p.name + ' (' + p.role + ')') || [])}
                ${fieldTags('Dollar Amounts', data.dollar_amounts?.map(d => d.amount + ' - ' + d.description) || [])}
                ${fieldList('Key Obligations', data.key_obligations || [])}
            `;

            resultBox.style.display = 'block';
        }

        function field(label, value) {
            return `
                <div class="field-card">
                    <div class="field-label">${label}</div>
                    <div class="field-value">${value}</div>
                </div>
            `;
        }

        function fieldTags(label, items) {
            if (!items.length) return field(label, 'None found');
            return `
                <div class="field-card">
                    <div class="field-label">${label}</div>
                    <div class="field-value">
                        ${items.map(i => `<span class="tag">${i}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        function fieldList(label, items) {
            if (!items.length) return field(label, 'None found');
            return `
                <div class="field-card">
                    <div class="field-label">${label}</div>
                    <div class="field-value">
                        ${items.map(i => `<div style="padding: 4px 0; border-bottom: 1px solid #1a1d27;">• ${i}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function showError(message) {
            const errorBox = document.getElementById('error-box');
            errorBox.textContent = '❌ ' + message;
            errorBox.style.display = 'block';
            document.getElementById('result-box').style.display = 'none';
        }
    </script>
</body>
</html>
